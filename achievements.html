<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Achievements — Thanthai Periyar Govt Hospital Erode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .ach-body { max-width:1100px; margin:0 auto; padding:64px 48px; }

    /* Timeline layout */
    .ach-timeline { position:relative; }
    .ach-timeline::before { content:''; position:absolute; left:50%; top:0; bottom:0; width:2px; background:var(--border); transform:translateX(-50%); }
    .ach-row { display:grid; grid-template-columns:1fr 1fr; gap:0; margin-bottom:0; }
    .ach-row:nth-child(odd) .ach-card-wrap { grid-column:1; padding-right:52px; text-align:right; }
    .ach-row:nth-child(odd) .ach-card-wrap .ach-card { margin-left:auto; }
    .ach-row:nth-child(even) .ach-card-wrap { grid-column:2; grid-row:1; padding-left:52px; }
    .ach-row:nth-child(even) .ach-center { grid-column:1; grid-row:1; }
    .ach-center { display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
    .ach-dot { width:44px; height:44px; background:var(--primary); border-radius:50%; border:4px solid var(--white); box-shadow:0 0 0 3px var(--primary); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }

    .ach-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-md); padding:24px; max-width:420px; transition:var(--transition); margin-bottom:32px; }
    .ach-card:hover { box-shadow:var(--shadow-md); }
    .ach-card-year { font-size:11px; font-weight:700; color:var(--secondary); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; }
    .ach-card-cat { margin-bottom:10px; }
    .ach-card-title { font-size:19px; margin-bottom:10px; }
    .ach-card-desc { font-size:13.5px; color:var(--body-text); line-height:1.7; margin-bottom:14px; }
    .ach-impact { background:var(--cream); border-left:3px solid var(--secondary); padding:10px 14px; font-size:13px; font-weight:600; color:var(--primary); border-radius:0 6px 6px 0; text-align:left; }

    /* Mobile: stack vertically */
    @media(max-width:768px) {
      .ach-body { padding:40px 20px; }
      .ach-timeline::before { left:20px; }
      .ach-row { grid-template-columns:40px 1fr; }
      .ach-row:nth-child(odd) .ach-card-wrap,
      .ach-row:nth-child(even) .ach-card-wrap { grid-column:2; grid-row:1; padding:0 0 0 20px; text-align:left; }
      .ach-row:nth-child(odd) .ach-card-wrap .ach-card { margin-left:0; }
      .ach-row:nth-child(even) .ach-center { grid-column:1; grid-row:1; }
      .ach-center { align-items:flex-start; padding-top:24px; }
      .ach-dot { width:36px; height:36px; font-size:15px; }
      .ach-card { max-width:100%; }
    }
  </style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-breadcrumb"><a href="/index.html">Home</a> › Achievements</div>
    <h1>Achievements & Milestones</h1>
    <p>Key accomplishments in patient care, infrastructure growth, and public health excellence over the years.</p>
  </div>
</div>

<div class="ach-body">
  <div class="ach-timeline" id="achTimeline">
    <div class="loading-box"><div class="spinner"></div>Loading achievements...</div>
  </div>
</div>

<footer class="footer" id="footer"></footer>
<script src="/shared.js"></script>
<script>
async function loadAchievements() {
  try {
    const res  = await fetch('/hospital?section=achievements');
    const data = await res.json();
    const achs = (data.achievements || []).sort((a,b) => b.year - a.year);

    document.getElementById('achTimeline').innerHTML = achs.map((a, i) => {
      const isOdd = i % 2 === 0;
      const card = `
        <div class="ach-card fade-up" style="animation-delay:${i*0.07}s">
          <div class="ach-card-year">${a.year}</div>
          <div class="ach-card-cat"><span class="badge badge-primary">${a.category}</span></div>
          <h2 class="ach-card-title">${a.icon} ${a.title}</h2>
          <p class="ach-card-desc">${a.desc}</p>
          <div class="ach-impact">📊 Impact: ${a.impact}</div>
        </div>`;
      if (isOdd) {
        return `<div class="ach-row">
          <div class="ach-card-wrap">${card}</div>
          <div class="ach-center"><div class="ach-dot">${a.icon}</div></div>
        </div>`;
      } else {
        return `<div class="ach-row">
          <div class="ach-center"><div class="ach-dot">${a.icon}</div></div>
          <div class="ach-card-wrap">${card}</div>
        </div>`;
      }
    }).join('');
  } catch(e) { console.error(e); }
}
loadAchievements();
</script>
</body>
</html>
